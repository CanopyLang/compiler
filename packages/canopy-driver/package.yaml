---
name: canopy-driver
version: 0.19.1
synopsis: "Canopy compiler driver and orchestration"
description: |
  High-level compiler driver that orchestrates the query-based compilation
  system. Includes specific query implementations, worker pool for parallel
  compilation, and overall compilation coordination.

homepage: "https://github.com/quinten/canopy"
license: BSD-3-Clause
license-file: ../../LICENSE
author: "Quinten Kasteel"
maintainer: "info@canopy-lang.org"
copyright: "Copyright (c) 2025-present, Quinten Kasteel"
category: Compiler, Language

dependencies:
  - base
  - bytestring
  - containers
  - text
  - filepath
  - directory
  - time
  - canopy-core
  - canopy-query

default-extensions:
  - ConstraintKinds
  - DataKinds
  - DerivingStrategies
  - DerivingVia
  - DeriveFunctor
  - DeriveGeneric
  - DeriveDataTypeable
  - DuplicateRecordFields
  - FlexibleContexts
  - FlexibleInstances
  - GADTs
  - KindSignatures
  - LambdaCase
  - MultiParamTypeClasses
  - NamedFieldPuns
  - OverloadedStrings
  - PolyKinds
  - RankNTypes
  - ScopedTypeVariables
  - StandaloneDeriving
  - StrictData
  - TypeApplications
  - TypeFamilies
  - TypeOperators
  - ViewPatterns
  - UndecidableInstances

library:
  source-dirs: src
  ghc-options:
    - -Wall
    - -fwarn-tabs
    - -O2
    - -Wno-unused-do-bind
