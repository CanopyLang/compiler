---
name: canopy-builder
version: 0.19.1
synopsis: "Canopy build system and package management"
description: |
  Build system for Canopy compiler including dependency resolution,
  package management, artifact handling, and incremental compilation.

  This package handles:
    * Dependency solving and constraint resolution
    * Package registry interaction
    * Build artifacts and caching
    * Project outline and configuration
    * File system operations for builds

homepage: "https://github.com/quinten/canopy"
license: BSD-3-Clause
license-file: ../../LICENSE
author: "Quinten Kasteel"
maintainer: "info@canopy-lang.org"
copyright: "Copyright (c) 2025-present, Quinten Kasteel"
category: Compiler, Language

dependencies:
  - base
  - aeson
  - ansi-terminal
  - ansi-wl-pprint
  - async
  - binary
  - bytestring
  - containers
  - directory
  - edit-distance
  - file-embed
  - filelock
  - filepath
  - HTTP
  - http-client
  - http-client-tls
  - http-types
  - lens
  - mtl
  - network
  - network-uri
  - crypton
  - crypton-connection
  - memory
  - process
  - SHA
  - snap-core
  - snap-server
  - stm
  - text
  - time
  - unordered-containers
  - utf8-string
  - vector
  - zip-archive
  - canopy-core
  - canopy-query
  - canopy-driver

default-extensions:
  - ConstraintKinds
  - DataKinds
  - DerivingStrategies
  - DerivingVia
  - DeriveFunctor
  - DeriveGeneric
  - DeriveDataTypeable
  - DuplicateRecordFields
  - FlexibleContexts
  - FlexibleInstances
  - GADTs
  - KindSignatures
  - LambdaCase
  - MultiParamTypeClasses
  - NamedFieldPuns
  - OverloadedStrings
  - PolyKinds
  - RankNTypes
  - ScopedTypeVariables
  - StandaloneDeriving
  - StrictData
  - TypeApplications
  - TypeFamilies
  - TypeOperators
  - ViewPatterns
  - UndecidableInstances

library:
  source-dirs:
    - src
  ghc-options:
    - -Wall
    - -fwarn-tabs
    - -O2
    - -Wno-unused-do-bind
