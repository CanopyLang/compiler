---
name: canopy-convert
version: 0.19.1
synopsis: "Elm-to-Canopy package conversion library"
description: |
  Converts pure Elm packages to Canopy format by renaming file extensions
  (.elm to .can), remapping project file metadata (elm.json to canopy.json),
  and transforming package dependency references (elm/* to canopy/*).

  This package provides:
    * Core conversion logic shared between CLI and server
    * Package name mapping (elm/* to canopy/*)
    * Project file transformation
    * Source file discovery and renaming

homepage: "https://github.com/quinten/canopy"
license: BSD-3-Clause
license-file: ../../LICENSE
author: "Quinten Kasteel"
maintainer: "info@canopy-lang.org"
copyright: "Copyright (c) 2025-present, Quinten Kasteel"
category: Compiler, Language

dependencies:
  - base
  - bytestring
  - containers
  - directory
  - filepath
  - lens
  - text

default-extensions:
  - ConstraintKinds
  - DataKinds
  - DerivingStrategies
  - DerivingVia
  - DeriveFunctor
  - DeriveGeneric
  - DeriveDataTypeable
  - DuplicateRecordFields
  - FlexibleContexts
  - FlexibleInstances
  - GADTs
  - KindSignatures
  - LambdaCase
  - MultiParamTypeClasses
  - NamedFieldPuns
  - OverloadedStrings
  - PolyKinds
  - RankNTypes
  - ScopedTypeVariables
  - StandaloneDeriving
  - StrictData
  - TypeApplications
  - TypeFamilies
  - TypeOperators
  - ViewPatterns
  - UndecidableInstances

library:
  source-dirs: src
  ghc-options:
    - -Wall
    - -fwarn-tabs
    - -O2
    - -Wno-unused-do-bind
  exposed-modules:
    - Convert
    - Convert.PackageMap
    - Convert.ProjectFile
    - Convert.Source
    - Convert.Types
