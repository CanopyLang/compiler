---
name: canopy-core
version: 0.19.1
synopsis: "Canopy compiler core components"
description: |
  Core compiler functionality including AST, parsing, type checking,
  canonicalization, optimization, and code generation. This package
  contains no STM/MVar/TVar usage - only pure functional code.

homepage: "https://github.com/quinten/canopy"
license: BSD-3-Clause
license-file: ../../LICENSE
author: "Quinten Kasteel"
maintainer: "info@canopy-lang.org"
copyright: "Copyright (c) 2025-present, Quinten Kasteel"
category: Compiler, Language

dependencies:
  - base
  - bytestring
  - containers
  - text
  - directory
  - filepath
  - binary
  - time
  - mtl
  - parsec
  - scientific
  - vector
  - ansi-wl-pprint
  - ansi-terminal-types
  - edit-distance
  - utf8-string
  - SHA
  - language-glsl
  - language-javascript
  - template-haskell
  - ghc-prim
  - raw-strings-qq
  - lens
  - zip-archive
  - filelock
  - aeson
  - aeson-pretty
  - async
  - stm

default-extensions:
  - ConstraintKinds
  - DataKinds
  - DerivingStrategies
  - DerivingVia
  - DeriveFunctor
  - DeriveGeneric
  - DeriveDataTypeable
  - DuplicateRecordFields
  - FlexibleContexts
  - FlexibleInstances
  - GADTs
  - KindSignatures
  - LambdaCase
  - MultiParamTypeClasses
  - NamedFieldPuns
  - OverloadedStrings
  - PolyKinds
  - RankNTypes
  - ScopedTypeVariables
  - StandaloneDeriving
  - TypeApplications
  - TypeFamilies
  - TypeOperators
  - ViewPatterns
  - UndecidableInstances

library:
  source-dirs: src
  ghc-options:
    - -Wall
    - -fwarn-tabs
    - -O2
    - -Wno-unused-do-bind
