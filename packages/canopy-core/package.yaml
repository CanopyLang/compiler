---
name: canopy-core
version: 0.19.1
synopsis: "Canopy compiler core components"
description: |
  Core compiler functionality including AST, parsing, type checking,
  canonicalization, optimization, and code generation. Includes
  concurrent type solving via STM and parallel compilation support.

homepage: "https://github.com/quinten/canopy"
license: BSD-3-Clause
license-file: ../../LICENSE
author: "Quinten Kasteel"
maintainer: "info@canopy-lang.org"
copyright: "Copyright (c) 2025-present, Quinten Kasteel"
category: Compiler, Language

dependencies:
  - base
  - blaze-builder
  - bytestring
  - containers
  - text
  - directory
  - filepath
  - binary
  - time
  - mtl
  - parsec
  - scientific
  - vector
  - ansi-wl-pprint
  - ansi-terminal-types
  - edit-distance
  - utf8-string
  - SHA
  - language-glsl
  - language-javascript
  - template-haskell
  - ghc-prim
  - raw-strings-qq
  - lens
  - zip-archive
  - filelock
  - aeson
  - aeson-pretty
  - async
  - stm
  - transformers

default-extensions:
  - ConstraintKinds
  - DataKinds
  - DerivingStrategies
  - DerivingVia
  - DeriveFunctor
  - DeriveGeneric
  - DeriveDataTypeable
  - DuplicateRecordFields
  - FlexibleContexts
  - FlexibleInstances
  - GADTs
  - KindSignatures
  - LambdaCase
  - MultiParamTypeClasses
  - NamedFieldPuns
  - OverloadedStrings
  - PolyKinds
  - RankNTypes
  - ScopedTypeVariables
  - StandaloneDeriving
  - StrictData
  - TypeApplications
  - TypeFamilies
  - TypeOperators
  - ViewPatterns
  - UndecidableInstances

library:
  source-dirs: src
  ghc-options:
    - -Wall
    - -fwarn-tabs
    - -O2
    - -Wno-unused-do-bind
  generated-other-modules:
    - Paths_canopy_core
  exposed-modules:
    # -- Public API: Core AST types --
    - AST.Canonical
    - AST.Optimized
    - AST.Optimized.Expr
    - AST.Optimized.Graph
    - AST.Source
    - AST.Utils.Binop
    - AST.Utils.Shader
    - AST.Utils.Type
    # -- Public API: Canonicalization --
    - Canonicalize.Ability
    - Canonicalize.Environment
    - Canonicalize.Environment.Dups
    - Canonicalize.Expression
    - Canonicalize.Module
    - Canonicalize.Pattern
    - Canonicalize.ResolveAbilities
    # -- Public API: Canopy core types --
    - Canopy.Compiler.Type
    - Canopy.Compiler.Type.Extract
    - Canopy.Constraint
    - Canopy.Data.Bag
    - Canopy.Data.Index
    - Canopy.Data.Map.Utils
    - Canopy.Data.Name
    - Canopy.Data.NonEmptyList
    - Canopy.Data.OneOrMore
    - Canopy.Data.Utf8
    - Canopy.Docs
    - Canopy.Float
    - Canopy.Interface
    - Canopy.Kernel
    - Canopy.Licenses
    - Canopy.Limits
    - Canopy.Magnitude
    - Canopy.ModuleName
    - Canopy.Outline
    - Canopy.Package
    - Canopy.PathValidation
    - Canopy.String
    - Canopy.Version
    # -- Public API: FFI --
    - FFI.Capability
    - FFI.CapabilityEnforcement
    - FFI.Manifest
    - FFI.NpmPipeline
    - FFI.Resolve
    - FFI.StaticAnalysis
    - FFI.Types
    - FFI.TypeValidator
    - FFI.TypeScriptValidation
    - FFI.Validator
    # -- Public API: File operations --
    - File
    - File.Archive
    - File.Atomic
    - File.Binary
    - File.FileSystem
    - File.Package
    - File.Time
    - File.Utf8
    # -- Public API: Foreign --
    - Foreign.FFI
    - Foreign.TestGenerator
    # -- Public API: Formatting --
    - Format
    # -- Public API: Editor integration --
    - Editor.Integration
    # -- Public API: Code generation --
    - Generate.Form
    - Generate.Html
    - Generate.JavaScript
    - Generate.JavaScript.Ability
    - Generate.JavaScript.Builder
    - Generate.JavaScript.CodeSplit.Analyze
    - Generate.JavaScript.CodeSplit.Generate
    - Generate.JavaScript.CodeSplit.Manifest
    - Generate.JavaScript.CodeSplit.Runtime
