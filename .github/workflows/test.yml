name: Test Suite

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # Fast checks that don't require building the project
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Validate package DAG
      run: bash scripts/check-package-dag.sh

    - name: Security scan
      run: |
        echo "=== Checking for unsafe patterns ==="
        # unsafePerformIO without NOINLINE is always a bug
        UNSAFE=$(grep -rn "unsafePerformIO" packages/ --include="*.hs" | grep -v NOINLINE | grep -v "^Binary" || true)
        if [ -n "$UNSAFE" ]; then
          echo "FAIL: unsafePerformIO without NOINLINE found:"
          echo "$UNSAFE"
          exit 1
        fi
        echo "No unsafe patterns found."

  test:
    name: Test on ${{ matrix.os }} with GHC ${{ matrix.ghc }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        ghc: ['9.8.4']
        include:
          - os: macos-latest
            ghc: '9.8.4'
          - os: windows-latest
            ghc: '9.8.4'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Haskell
      uses: haskell/actions/setup@v2
      with:
        ghc-version: ${{ matrix.ghc }}
        enable-stack: true
        stack-version: 'latest'

    - name: Cache Stack dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.stack
          .stack-work
        key: ${{ runner.os }}-stack-${{ matrix.ghc }}-${{ hashFiles('stack.yaml', 'package.yaml') }}
        restore-keys: |
          ${{ runner.os }}-stack-${{ matrix.ghc }}-
          ${{ runner.os }}-stack-

    - name: Install dependencies
      run: stack build --test --only-dependencies

    - name: Build with -Werror
      run: stack build --test --no-run-tests --ghc-options="-Werror"

    - name: Run tests with timing
      run: stack test --coverage --ta="--time"

    - name: Check coverage threshold (80%)
      if: matrix.os == 'ubuntu-latest'
      run: bash scripts/check-coverage.sh 80

    - name: Check binary size
      if: matrix.os == 'ubuntu-latest'
      run: |
        BINARY=$(stack path --local-install-root)/bin/canopy
        if [ -f "$BINARY" ]; then
          SIZE=$(stat -c%s "$BINARY")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Binary size: ${SIZE_MB} MB ($SIZE bytes)"
          # 50 MB threshold prevents accidental bloat
          if [ "$SIZE" -gt 52428800 ]; then
            echo "FAIL: Binary exceeds 50 MB threshold"
            exit 1
          else
            echo "PASS: Binary size within 50 MB threshold"
          fi
        else
          echo "WARNING: Binary not found at $BINARY"
        fi

    - name: Generate coverage report
      if: matrix.os == 'ubuntu-latest'
      run: |
        stack exec -- hpc-codecov --mix=.stack-work/install/*/doc/*/hpc_index.mix --out=codecov.json
      continue-on-error: true

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v3
      with:
        file: ./codecov.json
      continue-on-error: true

  lint-and-format:
    name: Lint & Format
    needs: preflight
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Haskell
      uses: haskell/actions/setup@v2
      with:
        ghc-version: '9.8.4'
        enable-stack: true
        stack-version: 'latest'

    - name: Install HLint
      run: stack install hlint

    - name: Install Ormolu
      run: stack install ormolu

    - name: Run HLint (fail on warnings)
      run: hlint packages/ test/ bench/ --report=hlint-report.html

    - name: Run Ormolu format check
      run: make format-check

    - name: Upload HLint report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: hlint-report
        path: hlint-report.html
