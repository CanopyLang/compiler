<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canopy Debugger</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
          Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        width: 300px;
        padding: 16px;
        background: #1e1e1e;
        color: #e0e0e0;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .logo {
        width: 32px;
        height: 32px;
        color: #4caf50;
      }

      h1 {
        font-size: 18px;
        font-weight: 600;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px;
        background: #2d2d2d;
        border-radius: 8px;
        margin-bottom: 16px;
      }

      .status-indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .status-connected {
        background: #4caf50;
      }

      .status-disconnected {
        background: #f44336;
      }

      .status-connecting {
        background: #ff9800;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      .status-text {
        flex: 1;
        font-size: 14px;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      button {
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .primary-button {
        background: #4caf50;
        color: white;
      }

      .primary-button:hover {
        background: #45a049;
      }

      .secondary-button {
        background: #2d2d2d;
        color: #e0e0e0;
        border: 1px solid #444;
      }

      .secondary-button:hover {
        background: #3d3d3d;
      }

      .info {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #333;
        font-size: 12px;
        color: #888;
      }

      .info p {
        margin-bottom: 8px;
      }

      a {
        color: #4caf50;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <svg class="logo" viewBox="0 0 24 24">
        <path
          fill="currentColor"
          d="M12 2L4 7v10l8 5 8-5V7l-8-5zm0 2.18l6 3.75v7.14l-6 3.75-6-3.75V7.93l6-3.75z"
        />
      </svg>
      <h1>Canopy Debugger</h1>
    </div>

    <div class="status" id="status">
      <span class="status-indicator status-disconnected" id="status-indicator"></span>
      <span class="status-text" id="status-text">Checking for Canopy...</span>
    </div>

    <div class="actions">
      <button class="primary-button" id="open-devtools">
        Open DevTools Panel
      </button>
      <button class="secondary-button" id="server-status">
        Check Debug Server
      </button>
    </div>

    <div class="info">
      <p>
        The Canopy Debugger allows you to inspect and time-travel through your
        application's state history.
      </p>
      <p>
        <a href="https://canopy-lang.org/docs/debugging" target="_blank">
          View Documentation
        </a>
      </p>
    </div>

    <script>
      const statusIndicator = document.getElementById('status-indicator');
      const statusText = document.getElementById('status-text');

      // Check if Canopy is detected on the current page
      chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
        const tabId = tabs[0]?.id;
        if (!tabId) return;

        chrome.tabs.sendMessage(tabId, { type: 'checkCanopy' }, (response) => {
          if (chrome.runtime.lastError) {
            statusIndicator.className = 'status-indicator status-disconnected';
            statusText.textContent = 'No Canopy application detected';
            return;
          }
        });
      });

      // Listen for Canopy detection
      chrome.runtime.onMessage.addListener((message) => {
        if (message.type === 'canopyDetected') {
          statusIndicator.className = 'status-indicator status-connected';
          statusText.textContent = 'Canopy application detected';
        } else if (message.type === 'canopyNotDetected') {
          statusIndicator.className = 'status-indicator status-disconnected';
          statusText.textContent = 'No Canopy application detected';
        }
      });

      // Open DevTools panel
      document.getElementById('open-devtools').addEventListener('click', () => {
        chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
          chrome.tabs.sendMessage(tabs[0].id, { type: 'openDevtools' });
        });
        window.close();
      });

      // Check debug server
      document.getElementById('server-status').addEventListener('click', async () => {
        try {
          const response = await fetch('http://localhost:8765/api/status');
          const data = await response.json();
          statusText.textContent = `Server running (${data.clients} clients)`;
          statusIndicator.className = 'status-indicator status-connected';
        } catch (e) {
          statusText.textContent = 'Debug server not running';
          statusIndicator.className = 'status-indicator status-disconnected';
        }
      });
    </script>
  </body>
</html>
