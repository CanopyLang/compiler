<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PannerNode 3D Spatial Audio Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .section {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .control-group {
            margin: 15px 0;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #ffd700;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 5px;
            background: rgba(255,255,255,0.3);
            outline: none;
        }
        .value-display {
            min-width: 80px;
            text-align: right;
            font-weight: bold;
            color: #ffd700;
        }
        button {
            background: rgba(40,167,69,0.8);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }
        button:hover {
            background: rgba(40,167,69,1);
            transform: translateY(-2px);
        }
        button:disabled {
            background: rgba(100,100,100,0.5);
            cursor: not-allowed;
            transform: none;
        }
        .status {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
        }
        .log {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .success { color: #90EE90; }
        .error { color: #ff6b6b; }
        .info { color: #64b5f6; }
    </style>
</head>
<body>
    <h1>🎵 PannerNode 3D Spatial Audio Test Suite</h1>

    <div class="section">
        <h2>🎛️ Audio Initialization</h2>
        <button id="initBtn" onclick="initializeAudio()">Initialize Audio Context</button>
        <button id="playBtn" onclick="startAudio()" disabled>▶️ Start Audio</button>
        <button id="stopBtn" onclick="stopAudio()" disabled>⏹️ Stop Audio</button>
        <div class="status" id="status">Ready - Click Initialize to begin</div>
    </div>

    <div class="section">
        <h2>🔊 Audio Parameters</h2>
        <div class="control-group">
            <label>Frequency</label>
            <div class="slider-container">
                <input type="range" id="frequencySlider" min="100" max="2000" value="440" step="10" oninput="updateFrequency(this.value)">
                <span class="value-display" id="frequencyValue">440 Hz</span>
            </div>
        </div>
        <div class="control-group">
            <label>Volume</label>
            <div class="slider-container">
                <input type="range" id="volumeSlider" min="0" max="100" value="30" step="5" oninput="updateVolume(this.value)">
                <span class="value-display" id="volumeValue">30%</span>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>🌐 3D Spatial Positioning (PannerNode)</h2>
        <button id="createPannerBtn" onclick="createPanner()" disabled>Create Panner Node</button>

        <div class="controls">
            <div>
                <h3>X-Axis (Left ← → Right)</h3>
                <div class="control-group">
                    <div class="slider-container">
                        <input type="range" id="xSlider" min="-10" max="10" value="0" step="0.1" oninput="updatePosition()" disabled>
                        <span class="value-display" id="xValue">0.0</span>
                    </div>
                </div>

                <h3>Y-Axis (Down ← → Up)</h3>
                <div class="control-group">
                    <div class="slider-container">
                        <input type="range" id="ySlider" min="-10" max="10" value="0" step="0.1" oninput="updatePosition()" disabled>
                        <span class="value-display" id="yValue">0.0</span>
                    </div>
                </div>

                <h3>Z-Axis (Behind ← → Front)</h3>
                <div class="control-group">
                    <div class="slider-container">
                        <input type="range" id="zSlider" min="-10" max="10" value="-1" step="0.1" oninput="updatePosition()" disabled>
                        <span class="value-display" id="zValue">-1.0</span>
                    </div>
                </div>
            </div>

            <div>
                <h3>Test Presets</h3>
                <button onclick="setPosition(-10, 0, 0)" disabled id="presetBtn1">Far Left</button>
                <button onclick="setPosition(10, 0, 0)" disabled id="presetBtn2">Far Right</button>
                <button onclick="setPosition(0, -10, 0)" disabled id="presetBtn3">Below</button>
                <button onclick="setPosition(0, 10, 0)" disabled id="presetBtn4">Above</button>
                <button onclick="setPosition(0, 0, -10)" disabled id="presetBtn5">Behind</button>
                <button onclick="setPosition(0, 0, 10)" disabled id="presetBtn6">In Front</button>
                <button onclick="setPosition(5, 3, -2)" disabled id="presetBtn7">Right-Up-Behind</button>
                <button onclick="setPosition(-5, -3, 2)" disabled id="presetBtn8">Left-Down-Front</button>
                <button onclick="setPosition(0, 0, 0)" disabled id="presetBtn9">Center</button>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>📊 Test Log</h2>
        <button onclick="clearLog()">Clear Log</button>
        <button onclick="runAutomatedTests()" id="autoTestBtn" disabled>Run Automated Tests</button>
        <div class="log" id="log"></div>
    </div>

    <script>
        let audioContext = null;
        let oscillator = null;
        let gainNode = null;
        let pannerNode = null;
        let isPlaying = false;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }

        function updateStatus(message) {
            document.getElementById('status').textContent = message;
            log(message);
        }

        function initializeAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();

                // Create oscillator
                oscillator = audioContext.createOscillator();
                oscillator.frequency.value = 440;
                oscillator.type = 'sine';

                // Create gain node
                gainNode = audioContext.createGain();
                gainNode.gain.value = 0.3;

                updateStatus('✅ AudioContext initialized successfully');
                log('AudioContext state: ' + audioContext.state, 'success');
                log('Sample rate: ' + audioContext.sampleRate + ' Hz', 'info');

                document.getElementById('initBtn').disabled = true;
                document.getElementById('playBtn').disabled = false;
                document.getElementById('createPannerBtn').disabled = false;

            } catch (error) {
                updateStatus('❌ Error: ' + error.message);
                log('Initialization failed: ' + error.message, 'error');
            }
        }

        function createPanner() {
            if (!audioContext) {
                updateStatus('❌ Error: AudioContext not initialized');
                return;
            }

            try {
                pannerNode = audioContext.createPanner();

                // Configure panner
                pannerNode.panningModel = 'HRTF';
                pannerNode.distanceModel = 'inverse';
                pannerNode.refDistance = 1;
                pannerNode.maxDistance = 10000;
                pannerNode.rolloffFactor = 1;
                pannerNode.coneInnerAngle = 360;
                pannerNode.coneOuterAngle = 0;
                pannerNode.coneOuterGain = 0;

                // Set initial position
                const x = parseFloat(document.getElementById('xSlider').value);
                const y = parseFloat(document.getElementById('ySlider').value);
                const z = parseFloat(document.getElementById('zSlider').value);
                pannerNode.positionX.value = x;
                pannerNode.positionY.value = y;
                pannerNode.positionZ.value = z;

                // Set listener position at origin
                audioContext.listener.positionX.value = 0;
                audioContext.listener.positionY.value = 0;
                audioContext.listener.positionZ.value = 0;

                updateStatus('✅ PannerNode created at position (' + x + ', ' + y + ', ' + z + ')');
                log('Panner model: ' + pannerNode.panningModel, 'success');
                log('Distance model: ' + pannerNode.distanceModel, 'success');

                // Enable sliders and preset buttons
                document.getElementById('xSlider').disabled = false;
                document.getElementById('ySlider').disabled = false;
                document.getElementById('zSlider').disabled = false;
                for (let i = 1; i <= 9; i++) {
                    document.getElementById('presetBtn' + i).disabled = false;
                }
                document.getElementById('autoTestBtn').disabled = false;
                document.getElementById('createPannerBtn').disabled = true;

            } catch (error) {
                updateStatus('❌ Error creating panner: ' + error.message);
                log('Panner creation failed: ' + error.message, 'error');
            }
        }

        function startAudio() {
            if (!audioContext || !oscillator || !gainNode) {
                updateStatus('❌ Error: Audio not initialized');
                return;
            }

            try {
                // Connect audio graph
                if (pannerNode) {
                    oscillator.connect(pannerNode);
                    pannerNode.connect(gainNode);
                } else {
                    oscillator.connect(gainNode);
                }
                gainNode.connect(audioContext.destination);

                oscillator.start();
                isPlaying = true;

                updateStatus('🔊 Audio playing at ' + oscillator.frequency.value + ' Hz');
                log('Audio started with ' + (pannerNode ? '3D spatial' : 'stereo') + ' output', 'success');

                document.getElementById('playBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;

            } catch (error) {
                updateStatus('❌ Error starting audio: ' + error.message);
                log('Playback failed: ' + error.message, 'error');
            }
        }

        function stopAudio() {
            if (oscillator && isPlaying) {
                try {
                    oscillator.stop();
                    oscillator.disconnect();
                    isPlaying = false;

                    // Recreate oscillator for next play
                    oscillator = audioContext.createOscillator();
                    oscillator.frequency.value = parseFloat(document.getElementById('frequencySlider').value);
                    oscillator.type = 'sine';

                    updateStatus('⏹️ Audio stopped');
                    log('Audio stopped and oscillator reset', 'info');

                    document.getElementById('playBtn').disabled = false;
                    document.getElementById('stopBtn').disabled = true;

                } catch (error) {
                    updateStatus('❌ Error stopping audio: ' + error.message);
                    log('Stop failed: ' + error.message, 'error');
                }
            }
        }

        function updateFrequency(value) {
            document.getElementById('frequencyValue').textContent = value + ' Hz';
            if (oscillator) {
                oscillator.frequency.value = value;
                if (isPlaying) {
                    log('Frequency updated to ' + value + ' Hz', 'info');
                }
            }
        }

        function updateVolume(value) {
            const volume = value / 100;
            document.getElementById('volumeValue').textContent = value + '%';
            if (gainNode) {
                gainNode.gain.value = volume;
                if (isPlaying) {
                    log('Volume updated to ' + value + '%', 'info');
                }
            }
        }

        function updatePosition() {
            if (!pannerNode) return;

            const x = parseFloat(document.getElementById('xSlider').value);
            const y = parseFloat(document.getElementById('ySlider').value);
            const z = parseFloat(document.getElementById('zSlider').value);

            pannerNode.positionX.value = x;
            pannerNode.positionY.value = y;
            pannerNode.positionZ.value = z;

            document.getElementById('xValue').textContent = x.toFixed(1);
            document.getElementById('yValue').textContent = y.toFixed(1);
            document.getElementById('zValue').textContent = z.toFixed(1);

            updateStatus('📍 Position: (' + x.toFixed(1) + ', ' + y.toFixed(1) + ', ' + z.toFixed(1) + ')');
            log('Position updated to (' + x.toFixed(1) + ', ' + y.toFixed(1) + ', ' + z.toFixed(1) + ')', 'info');
        }

        function setPosition(x, y, z) {
            document.getElementById('xSlider').value = x;
            document.getElementById('ySlider').value = y;
            document.getElementById('zSlider').value = z;
            updatePosition();
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('Log cleared', 'info');
        }

        async function runAutomatedTests() {
            if (!pannerNode || !isPlaying) {
                updateStatus('❌ Error: Start audio and create panner first');
                return;
            }

            log('=== Starting Automated Spatial Audio Tests ===', 'success');

            const tests = [
                { name: 'Far Left', x: -10, y: 0, z: 0, wait: 500 },
                { name: 'Far Right', x: 10, y: 0, z: 0, wait: 500 },
                { name: 'Center', x: 0, y: 0, z: 0, wait: 500 },
                { name: 'Below', x: 0, y: -10, z: 0, wait: 500 },
                { name: 'Above', x: 0, y: 10, z: 0, wait: 500 },
                { name: 'Behind', x: 0, y: 0, z: -10, wait: 500 },
                { name: 'In Front', x: 0, y: 0, z: 10, wait: 500 },
                { name: 'Right-Up-Behind', x: 5, y: 3, z: -2, wait: 500 },
                { name: 'Left-Down-Front', x: -5, y: -3, z: 2, wait: 500 },
            ];

            for (const test of tests) {
                log('Testing: ' + test.name, 'info');
                setPosition(test.x, test.y, test.z);
                await new Promise(resolve => setTimeout(resolve, test.wait));
            }

            log('=== Automated Tests Complete ===', 'success');
            setPosition(0, 0, 0);
        }

        // Initialize displays
        document.getElementById('xValue').textContent = '0.0';
        document.getElementById('yValue').textContent = '0.0';
        document.getElementById('zValue').textContent = '-1.0';
    </script>
</body>
</html>
