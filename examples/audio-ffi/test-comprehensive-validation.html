<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Audio FFI Validation - 225 Functions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .test-categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .category {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }
        .category-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            font-weight: bold;
            font-size: 1.1em;
        }
        .category-tests {
            padding: 15px;
        }
        .test-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            background: #f5f5f5;
            transition: all 0.3s;
        }
        .test-item.running {
            background: #fff9e6;
            border-left: 4px solid #ffc107;
        }
        .test-item.passed {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }
        .test-item.failed {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }
        .test-status {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .test-name {
            flex-grow: 1;
            font-size: 0.95em;
        }
        .test-detail {
            font-size: 0.85em;
            color: #666;
            margin-left: 36px;
            padding: 5px 0;
        }
        .controls {
            margin: 30px 0;
            text-align: center;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 0 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .summary {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            text-align: center;
            font-size: 1.2em;
        }
        .summary.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .summary.failure {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Comprehensive Audio FFI Validation</h1>
        <p class="subtitle">Testing all 225 Web Audio API functions (90% full spec coverage)</p>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-tests">0</div>
                <div class="stat-label">Total Tests</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="passed-tests">0</div>
                <div class="stat-label">Passed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="failed-tests">0</div>
                <div class="stat-label">Failed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="coverage">0%</div>
                <div class="stat-label">Coverage</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="runAllTests()" id="run-button">▶️ Run All Tests</button>
            <button onclick="location.reload()">🔄 Reset</button>
        </div>

        <div id="summary" class="summary" style="display: none;"></div>

        <div class="test-categories" id="test-container"></div>
    </div>

    <script src="external/audio.js"></script>

            ],
            "💾 Offline Rendering": [

                { name: "startOfflineRenderingAsync", fn: testStartOfflineRenderingAsync },
                { name: "getOfflineContextLength", fn: testGetOfflineContextLength },

        // Initialize test UI
        function initializeTests() {
            const container = document.getElementById('test-container');
            let totalTests = 0;

            Object.entries(testCategories).forEach(([category, tests]) => {
                totalTests += tests.length;
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.innerHTML = `
                    <div class="category-header">${category} (${tests.length} tests)</div>
                    <div class="category-tests" id="category-${category.replace(/[^a-zA-Z0-9]/g, '')}"></div>
                `;
                container.appendChild(categoryDiv);

                const testsDiv = categoryDiv.querySelector('.category-tests');
                tests.forEach(test => {
                    const testDiv = document.createElement('div');
                    testDiv.className = 'test-item';
                    testDiv.id = `test-${test.name}`;
                    testDiv.innerHTML = `
                        <div class="test-status">⚪</div>
                        <div class="test-name">${test.name}</div>
                    `;
                    testsDiv.appendChild(testDiv);
                });
            });

            testStats.total = totalTests;
            document.getElementById('total-tests').textContent = totalTests;
            updateCoverage();
        }

        function markTestRunning(testName) {
            const testDiv = document.getElementById(`test-${testName}`);
            if (testDiv) {
                testDiv.className = 'test-item running';
                testDiv.querySelector('.test-status').textContent = '⏳';
            }
        }

        function markTestPassed(testName, detail) {
            const testDiv = document.getElementById(`test-${testName}`);
            if (testDiv) {
                testDiv.className = 'test-item passed';
                testDiv.querySelector('.test-status').textContent = '✅';
                if (detail) {
                    const detailDiv = document.createElement('div');
                    detailDiv.className = 'test-detail';
                    detailDiv.textContent = detail;
                    testDiv.appendChild(detailDiv);
                }
                testStats.passed++;
                updateStats();
            }
        }

        function markTestFailed(testName, error) {
            const testDiv = document.getElementById(`test-${testName}`);
            if (testDiv) {
                testDiv.className = 'test-item failed';
                testDiv.querySelector('.test-status').textContent = '❌';
                const detailDiv = document.createElement('div');
                detailDiv.className = 'test-detail';
                detailDiv.textContent = `Error: ${error}`;
                testDiv.appendChild(detailDiv);
                testStats.failed++;
                updateStats();
            }
        }

        function updateStats() {
            document.getElementById('passed-tests').textContent = testStats.passed;
            document.getElementById('failed-tests').textContent = testStats.failed;
            updateCoverage();
        }

        function updateCoverage() {
            const coverage = ((testStats.passed / testStats.total) * 100).toFixed(1);
            document.getElementById('coverage').textContent = `${coverage}%`;
        }

        async function initializeAudioContext() {
            if (testAudioContext) return true;
            try {
                const result = createAudioContext(1);
                if (result.$ === 'Ok') {
                    testAudioContext = result.a;
                    return true;
                }
                throw new Error('Failed to create audio context');
            } catch (e) {
                console.error('Context init failed:', e);
                return false;
            }
        }

        // Test implementations
        async function testCreateAudioContext() {
            markTestRunning('createAudioContext');
            try {
                const result = createAudioContext(1);
                if (result.$ === 'Ok' && result.a && result.a.a) {
                    markTestPassed('createAudioContext', 'Context created successfully');
                } else {
                    throw new Error('Invalid context result');
                }
            } catch (e) {
                markTestFailed('createAudioContext', e.message);
            }
        }

        async function testGetCurrentTime() {
            markTestRunning('getCurrentTime');
            try {
                if (!await initializeAudioContext()) throw new Error('Context init failed');
                const time = getCurrentTime(testAudioContext);
                if (typeof time === 'number' && time >= 0) {
                    markTestPassed('getCurrentTime', `Current time: ${time.toFixed(3)}s`);
                } else {
                    throw new Error('Invalid time value');
                }
            } catch (e) {
                markTestFailed('getCurrentTime', e.message);
            }
        }

        async function testResumeAudioContext() {
            markTestRunning('resumeAudioContext');
            try {
                if (!await initializeAudioContext()) throw new Error('Context init failed');
                const result = resumeAudioContext(testAudioContext);
                if (result.$ === 'Ok') {
                    markTestPassed('resumeAudioContext', 'Context resumed');
                } else {
                    throw new Error('Resume failed');
                }
            } catch (e) {
                markTestFailed('resumeAudioContext', e.message);
            }
        }

        async function testGetSampleRate() {
            markTestRunning('getSampleRate');
            try {
                if (!await initializeAudioContext()) throw new Error('Context init failed');
                const ctx = testAudioContext.a;
                const rate = getSampleRate(ctx);
                if (rate === 44100 || rate === 48000) {
                    markTestPassed('getSampleRate', `Sample rate: ${rate}Hz`);
                } else {
                    throw new Error(`Unexpected rate: ${rate}`);
                }
            } catch (e) {
                markTestFailed('getSampleRate', e.message);
            }
        }

        async function testGetContextState() {
            markTestRunning('getContextState');
            try {
                if (!await initializeAudioContext()) throw new Error('Context init failed');
                const state = getContextState(testAudioContext.a);
                if (['suspended', 'running', 'closed'].includes(state)) {
                    markTestPassed('getContextState', `State: ${state}`);
                } else {
                    throw new Error(`Invalid state: ${state}`);
                }
            } catch (e) {
                markTestFailed('getContextState', e.message);
            }
        }

        async function testGetContextBaseLatency() {

                if (!await initializeAudioContext()) throw new Error('Context init failed');
                const latency = getContextBaseLatency(testAudioContext.a);
                if (typeof latency === 'number' && latency >= 0) {
                    markTestPassed('getContextBaseLatency', `Base latency: ${(latency * 1000).toFixed(2)}ms`);
                } else {
                    throw new Error('Invalid latency value');
                }
            } catch (e) {

        }

        async function testGetContextDestination() {
            markTestRunning('getContextDestination');
            try {
                if (!await initializeAudioContext()) throw new Error('Context init failed');
                const dest = getContextDestination(testAudioContext.a);
                if (dest && dest.maxChannelCount) {
                    markTestPassed('getContextDestination', `Destination: ${dest.maxChannelCount} channels`);
                } else {
                    throw new Error('Invalid destination');
                }
            } catch (e) {
                markTestFailed('getContextDestination', e.message);
            }
        }

            markTestRunning('createOscillator');
            try {

        async function testConnectToDestination() {
            markTestRunning('connectToDestination');
            try {
                if (!await initializeAudioContext()) throw new Error('Context init failed');
                const gain = createGainNode(testAudioContext, 0.5);
                if (gain.$ === 'Ok') {
                    const result = connectToDestination(testAudioContext.a, gain.a);
                    if (result.$ === 'Ok') {
                        markTestPassed('connectToDestination', 'Connected to destination');
                    } else {
                        throw new Error('Connection failed');

        async function runAllTests() {
            document.getElementById('run-button').disabled = true;
            testStats = { total: testStats.total, passed: 0, failed: 0 };

            for (const [category, tests] of Object.entries(testCategories)) {
                for (const test of tests) {
                    await test.fn();
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
            }

            showSummary();
            document.getElementById('run-button').disabled = false;
        }

        function showSummary() {
            const summaryDiv = document.getElementById('summary');
            const coverage = ((testStats.passed / testStats.total) * 100).toFixed(1);
            const allPassed = testStats.failed === 0;

            summaryDiv.className = `summary ${allPassed ? 'success' : 'failure'}`;
            summaryDiv.style.display = 'block';

            if (allPassed) {
                summaryDiv.innerHTML = `
                    🎉 <strong>ALL TESTS PASSED!</strong> ${testStats.passed}/${testStats.total} tests passed - ${coverage}% coverage<br>
                    <strong>Comprehensive Audio FFI Validation: COMPLETE ✅</strong>
                `;
            } else {
                summaryDiv.innerHTML = `
                    ⚠️ <strong>Some tests failed:</strong> ${testStats.passed} passed, ${testStats.failed} failed - ${coverage}% coverage<br>
                    Review failed tests above for details.
                `;
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', initializeTests);
