<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <title>Audio Auto-Initialization Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .status {
      background: #f0f0f0;
      padding: 15px;
      margin: 15px 0;
      border-radius: 5px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    .success {
      color: green;
      font-weight: bold;
    }
    .error {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Audio Auto-Initialization Test</h1>

  <p>This test verifies that clicking "Play Audio" immediately works without requiring manual initialization.</p>

  <div>
    <button onclick="testPlay()">Play Audio (440 Hz Sine)</button>
    <button onclick="testStop()">Stop Audio</button>
  </div>

  <div class="status" id="status">Status: Ready to test</div>

  <h2>Test Results:</h2>
  <div id="results"></div>

  <script src="external/audio.js"></script>
  <script>
    function log(message, isError = false) {
      const statusDiv = document.getElementById('status');
      statusDiv.textContent = message;
      statusDiv.className = isError ? 'status error' : 'status success';

      const resultsDiv = document.getElementById('results');
      const entry = document.createElement('div');
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      entry.className = isError ? 'error' : 'success';
      resultsDiv.appendChild(entry);
    }

    function testPlay() {
      log('Testing: Calling playToneSimplified without manual initialization...');

      try {
        const result = playToneSimplified(440, 'sine');
        log(`Result: ${result}`, result.includes('Error'));

        if (!result.includes('Error')) {
          log('✓ SUCCESS: Audio played without requiring manual initialization!');
        } else {
          log('✗ FAILED: ' + result, true);
        }
      } catch (e) {
        log('✗ EXCEPTION: ' + e.message, true);
      }
    }

    function testStop() {
      try {
        const result = stopAudioSimplified();
        log(`Stop result: ${result}`);
      } catch (e) {
        log('Stop error: ' + e.message, true);
      }
    }
  </script>
</body>
</html>
