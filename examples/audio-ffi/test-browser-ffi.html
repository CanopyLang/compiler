<!DOCTYPE html>
<html>
<head>
    <title>FFI Browser Test</title>
    <meta charset="utf-8">
</head>
<body>
    <div id="app"></div>

    <script src="browser-test.js"></script>
    <script>
        console.log('Testing FFI browser integration...');

        setTimeout(() => {
            console.log('Checking for Elm/Canopy objects...');
            console.log('window.Elm:', window.Elm);
            console.log('window.Canopy:', window.Canopy);

            try {
                if (window.Elm && window.Elm.BrowserTestFFI) {
                    console.log('✅ Found module in Elm namespace');
                    const app = window.Elm.BrowserTestFFI.init({
                        node: document.getElementById('app')
                    });
                    console.log('✅ FFI app initialized successfully:', app);
                } else if (window.Canopy && window.Canopy.BrowserTestFFI) {
                    console.log('✅ Found module in Canopy namespace');
                    const app = window.Canopy.BrowserTestFFI.init({
                        node: document.getElementById('app')
                    });
                    console.log('✅ FFI app initialized successfully:', app);
                } else {
                    console.error('❌ Module not found in either namespace');
                    document.getElementById('app').innerHTML = '<h1 style="color: red;">❌ Module not found</h1>';
                }
            } catch (error) {
                console.error('❌ Error initializing FFI app:', error);
                document.getElementById('app').innerHTML = '<h1 style="color: red;">❌ Error: ' + error.message + '</h1>';
            }
        }, 100);
    </script>
</body>
</html>
