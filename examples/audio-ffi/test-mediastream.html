<!DOCTYPE html>
<html>
<head>
    <title>MediaStream Audio Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .status {
            margin: 20px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>MediaStream Audio Node Test</h1>

    <div>
        <h2>Test Functions</h2>
        <button onclick="testGetUserMedia()">1. Request Microphone Access</button>
        <button onclick="testCreateMediaStreamSource()">2. Create MediaStreamSource</button>
        <button onclick="testCreateMediaStreamDestination()">3. Create MediaStreamDestination</button>
        <button onclick="testGetDestinationStream()">4. Get Destination Stream</button>
        <button onclick="testFullPipeline()">5. Test Full Pipeline</button>
    </div>

    <div class="status" id="status">
        Click a button to test MediaStream functionality
    </div>

    <script src="external/audio.js"></script>
    <script>
        let audioContext = null;
        let mediaStream = null;
        let streamSource = null;
        let streamDestination = null;

        function log(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + (isError ? 'error' : 'success');
            console.log(message);
        }

        async function testGetUserMedia() {
            try {
                log('Requesting microphone access...');

                // Create user activation wrapper (required by Canopy)
                const userActivation = { $: 'UserActivated' };

                const result = await getUserMedia(userActivation);

                if (result.$ === 'Ok') {
                    mediaStream = result.a;
                    log('✓ SUCCESS: Microphone access granted! Stream has ' +
                        mediaStream.getAudioTracks().length + ' audio track(s)');
                } else {
                    log('✗ ERROR: ' + result.a.a, true);
                }
            } catch (error) {
                log('✗ EXCEPTION: ' + error.message, true);
            }
        }

        async function testCreateMediaStreamSource() {
            try {
                if (!mediaStream) {
                    log('✗ ERROR: Run "Request Microphone Access" first', true);
                    return;
                }

                if (!audioContext) {
                    const userActivation = { $: 'UserActivated' };
                    const ctxResult = createAudioContext(userActivation);
                    if (ctxResult.$ === 'Ok') {
                        audioContext = ctxResult.a;
                        log('Created AudioContext');
                    } else {
                        log('✗ ERROR: Failed to create AudioContext: ' + ctxResult.a.a, true);
                        return;
                    }
                }

                log('Creating MediaStreamSource...');
                const result = createMediaStreamSource(audioContext, mediaStream);

                if (result.$ === 'Ok') {
                    streamSource = result.a;
                    log('✓ SUCCESS: MediaStreamSource created! Type: ' + streamSource.constructor.name);
                } else {
                    log('✗ ERROR: ' + result.a.a, true);
                }
            } catch (error) {
                log('✗ EXCEPTION: ' + error.message, true);
            }
        }

        async function testCreateMediaStreamDestination() {
            try {
                if (!audioContext) {
                    const userActivation = { $: 'UserActivated' };
                    const ctxResult = createAudioContext(userActivation);
                    if (ctxResult.$ === 'Ok') {
                        audioContext = ctxResult.a;
                        log('Created AudioContext');
                    } else {
                        log('✗ ERROR: Failed to create AudioContext: ' + ctxResult.a.a, true);
                        return;
                    }
                }

                log('Creating MediaStreamDestination...');
                const result = createMediaStreamDestination(audioContext);

                if (result.$ === 'Ok') {
                    streamDestination = result.a;
                    log('✓ SUCCESS: MediaStreamDestination created! Type: ' +
                        streamDestination.constructor.name);
                } else {
                    log('✗ ERROR: ' + result.a.a, true);
                }
            } catch (error) {
                log('✗ EXCEPTION: ' + error.message, true);
            }
        }

        async function testGetDestinationStream() {
            try {
                if (!streamDestination) {
                    log('✗ ERROR: Run "Create MediaStreamDestination" first', true);
                    return;
                }

                log('Getting stream from destination node...');
                const stream = getDestinationStream(streamDestination);

                log('✓ SUCCESS: Got MediaStream from destination! Tracks: ' +
                    stream.getAudioTracks().length);
            } catch (error) {
                log('✗ EXCEPTION: ' + error.message, true);
            }
        }

        async function testFullPipeline() {
            try {
                log('Testing full MediaStream pipeline...');

                // 1. Get user media
                const userActivation = { $: 'UserActivated' };
                const mediaResult = await getUserMedia(userActivation);
                if (mediaResult.$ !== 'Ok') {
                    log('✗ ERROR: Failed to get user media: ' + mediaResult.a.a, true);
                    return;
                }
                mediaStream = mediaResult.a;
                log('Step 1/5: Got microphone access ✓');

                // 2. Create audio context
                const ctxResult = createAudioContext(userActivation);
                if (ctxResult.$ !== 'Ok') {
                    log('✗ ERROR: Failed to create context: ' + ctxResult.a.a, true);
                    return;
                }
                audioContext = ctxResult.a;
                log('Step 2/5: Created AudioContext ✓');

                // 3. Create source from microphone
                const sourceResult = createMediaStreamSource(audioContext, mediaStream);
                if (sourceResult.$ !== 'Ok') {
                    log('✗ ERROR: Failed to create source: ' + sourceResult.a.a, true);
                    return;
                }
                streamSource = sourceResult.a;
                log('Step 3/5: Created MediaStreamSource ✓');

                // 4. Create destination for recording
                const destResult = createMediaStreamDestination(audioContext);
                if (destResult.$ !== 'Ok') {
                    log('✗ ERROR: Failed to create destination: ' + destResult.a.a, true);
                    return;
                }
                streamDestination = destResult.a;
                log('Step 4/5: Created MediaStreamDestination ✓');

                // 5. Connect source to destination
                streamSource.connect(streamDestination);
                log('Step 5/5: Connected source to destination ✓');

                // 6. Get output stream
                const outputStream = getDestinationStream(streamDestination);
                log('✓ COMPLETE SUCCESS: Full MediaStream pipeline working! Output stream has ' +
                    outputStream.getAudioTracks().length + ' audio track(s)');
            } catch (error) {
                log('✗ EXCEPTION: ' + error.message, true);
            }
        }
    </script>
</body>
</html>
