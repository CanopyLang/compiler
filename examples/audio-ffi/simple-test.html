<!DOCTYPE html>
<html>
<head>
    <title>Simple Canopy Test</title>
</head>
<body>
    <h1>Simple Canopy FFI Test</h1>
    <div id="app"></div>

    <script src="perfect-ffi-fixed.js"></script>
    <script>
        console.log('Script loaded');

        // Add a small delay to let the module export finish
        setTimeout(() => {
            console.log('Checking after delay...');
            console.log('window.Elm:', window.Elm);
            console.log('window.Canopy:', window.Canopy);

            if (window.Elm && window.Elm.PerfectFFIAudioDemoFixed) {
                console.log('Found module in Elm namespace');
                const app = window.Elm.PerfectFFIAudioDemoFixed.init({
                    node: document.getElementById('app')
                });
                console.log('App initialized:', app);
                document.getElementById('app').innerHTML = '<h2 style="color: green;">✅ Canopy FFI App Successfully Loaded!</h2>';
            } else if (window.Canopy && window.Canopy.PerfectFFIAudioDemoFixed) {
                console.log('Found module in Canopy namespace');
                const app = window.Canopy.PerfectFFIAudioDemoFixed.init({
                    node: document.getElementById('app')
                });
                console.log('App initialized:', app);
                document.getElementById('app').innerHTML = '<h2 style="color: green;">✅ Canopy FFI App Successfully Loaded!</h2>';
            } else {
                console.log('Module still not found');
                console.log('All window properties with our module name:', Object.keys(window).filter(k => k.includes('Perfect')));
                document.getElementById('app').innerHTML = '<p style="color: red;">❌ Module not found</p>';
            }
        }, 100);
    </script>
</body>
</html>
