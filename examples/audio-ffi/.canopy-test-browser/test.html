<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Canopy Browser Tests</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    pre { white-space: pre-wrap; }
    .pass { color: green; }
    .fail { color: red; }
  </style>
  <script src="external/capability.js"></script>
  <script src="external/audio.js"></script>
  <script src="BrowserTestMain.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    // Find Canopy/Elm app
    var Canopy = window.Elm || window.Canopy;
    if (Canopy && Canopy.BrowserTestMain) {
      var app = Canopy.BrowserTestMain.init({ node: document.getElementById('app') });
    } else {
      console.error('BrowserTestMain module not found');
      document.getElementById('app').innerHTML = '<pre>Error: BrowserTestMain not found</pre>';
    }
  </script>
</body>
</html>
