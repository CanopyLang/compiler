<!DOCTYPE html>
<html>
<head>
    <title>BiquadFilter Direct Test</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .section {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        button {
            background: rgba(40,167,69,0.8);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        button:hover {
            background: rgba(40,167,69,1);
        }
        button:disabled {
            background: rgba(100,100,100,0.5);
            cursor: not-allowed;
        }
        .filter-type-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid #ffd700;
        }
        .filter-type-btn.active {
            background: #ffd700;
            color: #000;
        }
        input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }
        .value-display {
            color: #ffd700;
            font-weight: bold;
            margin-left: 10px;
        }
        #status {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>🎛️ BiquadFilterNode Test - Advanced Features</h1>

    <div class="section">
        <h2>Test Scenario 1-2: Initialize Audio</h2>
        <button id="init" onclick="initAudio()">Initialize Audio Context</button>
        <button id="play" onclick="playAudio()" disabled>Play Audio</button>
        <button id="stop" onclick="stopAudio()" disabled>Stop Audio</button>
        <div id="status">Ready - Click Initialize</div>
    </div>

    <div class="section">
        <h2>Test Scenario 3: Create Filter</h2>
        <button id="createFilter" onclick="createFilter()" disabled>Create Filter Node</button>
    </div>

    <div class="section">
        <h2>Test Scenarios 4-7: Filter Types</h2>
        <div>
            <button class="filter-type-btn active" onclick="setFilterType('lowpass')">🌊 Lowpass</button>
            <button class="filter-type-btn" onclick="setFilterType('highpass')">⬆️ Highpass</button>
            <button class="filter-type-btn" onclick="setFilterType('bandpass')">📊 Bandpass</button>
            <button class="filter-type-btn" onclick="setFilterType('notch')">🚫 Notch</button>
        </div>
    </div>

    <div class="section">
        <h2>Test Scenario 8: Real-time Parameters</h2>
        <div>
            <label>Frequency: <span id="freqDisplay" class="value-display">1000 Hz</span></label>
            <input type="range" id="frequency" min="20" max="20000" value="1000" oninput="updateFrequency(this.value)">
        </div>
        <div>
            <label>Q (Resonance): <span id="qDisplay" class="value-display">1.0</span></label>
            <input type="range" id="q" min="0.1" max="30" step="0.1" value="1" oninput="updateQ(this.value)">
        </div>
        <div>
            <label>Gain: <span id="gainDisplay" class="value-display">0 dB</span></label>
            <input type="range" id="gain" min="-40" max="40" value="0" oninput="updateGain(this.value)">
        </div>
    </div>

    <script>
        // Global audio state
        let audioContext = null;
        let oscillator = null;
        let gainNode = null;
        let filterNode = null;
        let isPlaying = false;

        function log(message) {
            const status = document.getElementById('status');
            const timestamp = new Date().toLocaleTimeString();
            status.innerHTML = `[${timestamp}] ${message}`;
            console.log(message);
        }

        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                log('✅ AudioContext initialized - Ready to create nodes');
                document.getElementById('play').disabled = false;
                document.getElementById('createFilter').disabled = false;
            } catch (error) {
                log('❌ Error initializing AudioContext: ' + error.message);
            }
        }

        function playAudio() {
            if (!audioContext) {
                log('❌ AudioContext not initialized');
                return;
            }

            try {
                // Create oscillator and gain node
                oscillator = audioContext.createOscillator();
                gainNode = audioContext.createGain();

                oscillator.frequency.value = 440;
                oscillator.type = 'sine';
                gainNode.gain.value = 0.3;

                // Connect audio graph
                if (filterNode) {
                    oscillator.connect(filterNode);
                    filterNode.connect(gainNode);
                    log('🔊 Audio playing with filter applied');
                } else {
                    oscillator.connect(gainNode);
                    log('🔊 Audio playing (no filter)');
                }

                gainNode.connect(audioContext.destination);
                oscillator.start();

                isPlaying = true;
                document.getElementById('stop').disabled = false;
                document.getElementById('play').disabled = true;
            } catch (error) {
                log('❌ Error playing audio: ' + error.message);
            }
        }

        function stopAudio() {
            if (oscillator) {
                oscillator.stop();
                oscillator = null;
                isPlaying = false;
                document.getElementById('stop').disabled = true;
                document.getElementById('play').disabled = false;
                log('⏹️ Audio stopped');
            }
        }

        function createFilter() {
            if (!audioContext) {
                log('❌ AudioContext not initialized');
                return;
            }

            try {
                filterNode = audioContext.createBiquadFilter();
                filterNode.type = 'lowpass';
                filterNode.frequency.value = parseFloat(document.getElementById('frequency').value);
                filterNode.Q.value = parseFloat(document.getElementById('q').value);
                filterNode.gain.value = parseFloat(document.getElementById('gain').value);

                log('✅ Filter node created: ' + filterNode.type + ' @ ' + filterNode.frequency.value + ' Hz');

                // If audio is playing, reconnect with filter
                if (isPlaying) {
                    stopAudio();
                    setTimeout(playAudio, 100);
                }
            } catch (error) {
                log('❌ Error creating filter: ' + error.message);
            }
        }

        function setFilterType(type) {
            if (!filterNode) {
                log('⚠️ Create filter node first');
                return;
            }

            try {
                filterNode.type = type;
                log('✅ Filter type changed to: ' + type);

                // Update button states
                document.querySelectorAll('.filter-type-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
            } catch (error) {
                log('❌ Error setting filter type: ' + error.message);
            }
        }

        function updateFrequency(value) {
            document.getElementById('freqDisplay').textContent = value + ' Hz';
            if (filterNode) {
                filterNode.frequency.setValueAtTime(parseFloat(value), audioContext.currentTime);
                log('🎚️ Frequency updated: ' + value + ' Hz');
            }
        }

        function updateQ(value) {
            document.getElementById('qDisplay').textContent = value;
            if (filterNode) {
                filterNode.Q.setValueAtTime(parseFloat(value), audioContext.currentTime);
                log('🎚️ Q updated: ' + value);
            }
        }

        function updateGain(value) {
            document.getElementById('gainDisplay').textContent = value + ' dB';
            if (filterNode) {
                filterNode.gain.setValueAtTime(parseFloat(value), audioContext.currentTime);
                log('🎚️ Gain updated: ' + value + ' dB');
            }
        }
    </script>
</body>
</html>
