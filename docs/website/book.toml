[book]
authors = ["Canopy Team"]
language = "en"
multilingual = false
src = "src"
title = "Canopy Documentation"
description = "A modern, type-safe language for building reliable web applications"

[build]
build-dir = "book"
create-missing = true

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/canopy-lang/canopy"
site-url = "/canopy/"
cname = ""
input-404 = "404.md"
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = true
copyable = true
copy-js = true
line-numbers = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-hierarchical-title-separator = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
copy-js = true

[output.html.print]
enable = true

[preprocessor.index]

[preprocessor.links]

# Custom theme
additional-css = ["theme/custom.css"]
